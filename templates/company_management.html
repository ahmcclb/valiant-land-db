<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Information - Valiant Land</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/company_management.css') }}">
</head>
<body data-static-url="{{ url_for('static', filename='') }}">
    <div class="header-bar">
        <a href="/" class="logo-link">
    <img src="{{ url_for('static', filename='photos/logo-with-shield-120-wide.png') }}" 
         alt="Valiant Land Logo" class="logo">
         </a>
        <h1 class="site-title">Company Information</h1>
    </div>

    <div class="container">
        <form id="company-form">
            <div class="form-grid">
                <div class="form-group">
                    <label for="c_name">Company Name:</label>
                    <input type="text" id="c_name" name="c_name" required>
                </div>
                
                <div class="form-group">
                    <label for="c_phone">Company Phone:</label>
                    <input type="tel" id="c_phone" name="c_phone">
                </div>
                
                <div class="form-group">
                    <label for="c_fax">Company Fax:</label>
                    <input type="tel" id="c_fax" name="c_fax">
                </div>
                
                <div class="form-group">
                    <label for="c_email">Company Email:</label>
                    <input type="email" id="c_email" name="c_email">
                </div>
                <div class="form-group">
					<label for="c_url">Company Website URL:</label>
					<input type="text" id="c_url" name="c_url" placeholder="www.yourcompany.com">
				</div>
                <div class="form-group">
                    <label for="c_address">Company Address:</label>
                    <input type="text" id="c_address" name="c_address">
                </div>
                
                <div class="form-group">
                    <label for="c_city">Company City:</label>
                    <input type="text" id="c_city" name="c_city">
                </div>
                
                <div class="form-group">
                    <label for="c_state">Company State:</label>
                    <input type="text" id="c_state" name="c_state" maxlength="2">
                </div>
                
                <div class="form-group">
                    <label for="c_zip">Company Zip:</label>
                    <input type="text" id="c_zip" name="c_zip">
                </div>
                
                <div class="form-group">
                    <label for="c_nphone">Neutral Phone:</label>
                    <input type="tel" id="c_nphone" name="c_nphone">
                </div>
                
                <div class="form-group">
                    <label for="c_ophone">Offer Phone:</label>
                    <input type="tel" id="c_ophone" name="c_ophone">
                </div>
            </div>
            
            <!-- Signature Upload -->
<!-- Signature Upload -->
<div class="signature-section">
    <h3>Signature File</h3>
    <div class="upload-area">
        <img id="signature-preview" src="" alt="Signature" style="display: none;">
        <div id="no-signature" class="no-image">No signature uploaded</div>
    </div>
    <input type="file" id="signature-file" accept=".png,.jpg,.jpeg" style="display: none;">
    <button type="button" id="upload-btn" class="btn-upload">Upload Signature</button>
</div>
            
            <!-- Buttons -->
            <div class="form-buttons">
                <button type="button" id="cancel-btn" class="btn-cancel">Cancel</button>
                <button type="submit" id="save-btn" class="btn-success">Save</button>
            </div>
        </form>
    </div>

    <!-- Success/Error Messages -->
    <div id="message" class="message" style="display: none;"></div>

    <script>
    // Pass static URL to JavaScript
    window.STATIC_URL = '{{ url_for('static', filename='') }}';
    </script>
    <script src="{{ url_for('static', filename='js/company_management.js') }}"></script>
</body>
</html>
