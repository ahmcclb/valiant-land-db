<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Management - Valiant Land</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/status_management.css') }}">
</head>
<body>
    <div class="header-bar">
        <a href="/" class="logo-link">
    <img src="{{ url_for('static', filename='photos/logo-with-shield-120-wide.png') }}" 
         alt="Valiant Land Logo" class="logo">
		</a>
        <h1 class="site-title">Status Management</h1>
    </div>

    <div class="container">
        <div class="controls">
            <button id="add-status" class="btn-primary">Add New Status</button>
            <button id="save-order" class="btn-success">Save Order</button>
            <a href="/" class="btn-cancel">Back to Dashboard</a>
        </div>

        <div class="status-list" id="status-list">
            <!-- Status items will be populated here -->
        </div>
    </div>

    <!-- Add/Edit Status Popup -->
    <div id="status-popup-overlay" class="popup-overlay" style="display: none;"></div>
    <div id="status-popup" class="popup" style="display: none;">
        <div class="popup-content">
            <div class="popup-header">
                <h2 id="popup-title">Add New Status</h2>
                <span class="close-popup" data-popup="status-popup">&times;</span>
            </div>
            <div class="popup-body">
                <label>Status Name: <input type="text" id="status-name" required></label>
                <label>Color: <input type="color" id="status-color" value="#808080"></label>
            </div>
            <div class="popup-footer">
                <button class="btn-cancel" data-popup="status-popup">Cancel</button>
                <button class="btn-success" id="save-status">Save</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Popup -->
    <div id="delete-popup-overlay" class="popup-overlay" style="display: none;"></div>
    <div id="delete-popup" class="popup" style="display: none;">
        <div class="popup-content">
            <div class="popup-header">
                <h2>Confirm Delete</h2>
                <span class="close-popup" data-popup="delete-popup">&times;</span>
            </div>
            <div class="popup-body">
                <p>Are you sure you want to delete this status?</p>
                <p class="warning">This action cannot be undone.</p>
            </div>
            <div class="popup-footer">
                <button class="btn-cancel" data-popup="delete-popup">Cancel</button>
                <button class="btn-danger" id="confirm-delete">Delete</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/status_management.js') }}"></script>
</body>
</html>
